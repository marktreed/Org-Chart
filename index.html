<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Engineering Organization</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #151a1f;
      --muted: #65717d;
      --soft-line: #d8dee4;
      --page: #f1f3f5;
      --card: #ffffff;
      --dark: #242b31;
      --bubble-w: 190px;
      --bubble-h: 72px;
      --gap-x: 48px;
      --row-gap: 18px;
      --top-gap: 90px;
      --branch-offset: 56px;
      --pad: 38px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: var(--page);
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    button {
      min-height: 38px;
      border: 1px solid #b8c2ca;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      padding: 0 14px;
      font-weight: 650;
    }

    button:hover { border-color: #7c8b96; }

    main {
      padding: 6px clamp(8px, 2vw, 20px) 20px;
    }

    .summary {
      margin-bottom: 8px;
    }

    .summary-card,
    .snapshot-info-card,
    .snapshot-nav-card {
      background: var(--card);
      border: 1px solid var(--soft-line);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .snapshot-info-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .site-breakdown-card {
      padding: 8px 12px 10px;
    }

    .site-card-header {
      display: block;
    }

    .site-card-header h1 {
      font-size: clamp(22px, 2.7vw, 34px);
      text-align: center;
    }

    .snapshot-controls {
      display: grid;
      grid-template-columns: minmax(520px, 820px) max-content;
      gap: 10px;
      align-items: stretch;
      margin: 6px 4px 0 178px;
    }

    .snapshot-info-card,
    .snapshot-nav-card {
      min-height: 60px;
      background: rgba(255, 255, 255, .96);
      border-color: #c7d0d8;
      box-shadow: 0 10px 24px rgba(21, 26, 31, .12);
    }

    .snapshot-info-card {
      display: grid;
      grid-template-columns: repeat(3, minmax(150px, 1fr));
      gap: 0;
      padding: 8px 0;
    }

    .snapshot-info-card > div {
      display: grid;
      grid-template-rows: 20px 1fr;
      align-content: start;
      justify-items: center;
      min-width: 0;
      padding: 0 14px;
      border-right: 1px solid #e1e6ea;
      text-align: center;
    }

    .snapshot-info-card > div:last-child {
      border-right: 0;
    }

    .snapshot-info-card span {
      font-size: 11px;
      line-height: 1.15;
      white-space: nowrap;
    }

    .snapshot-info-card strong {
      display: block;
      margin-top: 4px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.05;
      color: var(--dark);
      white-space: nowrap;
    }

    .snapshot-nav-card {
      display: flex;
      align-items: center;
      padding: 8px 12px;
    }

    .site-breakdown {
      display: grid;
      grid-template-columns: 166px 1fr;
      gap: 10px;
      align-items: center;
      margin-top: 2px;
    }

    .site-pie {
      width: 128px;
      height: 128px;
      display: block;
      justify-self: center;
    }

    .site-pie-wrap {
      display: grid;
      justify-items: center;
      gap: 3px;
    }

    .site-pie-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .site-pie-empty {
      fill: #e4e9ee;
      stroke: #c9d2da;
      stroke-width: 1;
    }

    .site-legend {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(205px, 1fr));
      gap: 6px;
      min-width: 0;
    }

    .site-legend-item {
      display: grid;
      grid-template-columns: 12px 1fr auto;
      gap: 8px;
      align-items: center;
      min-width: 0;
      padding: 6px 8px;
      border: 1px solid #e1e6ea;
      border-radius: 7px;
      background: #f8fafb;
    }

    .site-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    .site-code {
      display: block;
      color: var(--ink);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.1;
      white-space: nowrap;
    }

    .site-detail {
      display: block;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .site-percent {
      color: var(--dark);
      font-size: 16px;
      font-weight: 800;
    }

    .summary-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 34px;
      white-space: nowrap;
    }

    .time-label {
      min-width: 58px;
      text-align: center;
      font-size: 18px;
      font-weight: 750;
      line-height: 1;
      white-space: nowrap;
    }

    .arrow-button {
      width: 40px;
      min-width: 40px;
      padding: 0;
      font-size: 24px;
      line-height: 1;
    }

    .arrow-button:disabled {
      cursor: not-allowed;
      border-color: #d4dbe0;
      background: #edf1f4;
      color: #9aa5ad;
      opacity: .78;
    }

    .error-panel {
      display: none;
      margin-bottom: 12px;
      padding: 12px 14px;
      border: 1px solid #d88b8b;
      border-radius: 8px;
      background: #fff2f2;
      color: #7a1d1d;
      font-size: 14px;
    }

    .error-panel.visible { display: block; }

    .chart-shell {
      position: relative;
      overflow: auto;
      min-height: calc(100vh - 220px);
      padding: 16px;
      border: 1px solid #cbd3da;
      border-radius: 8px;
      background: #f7f8fa;
    }

    .chart-fit {
      width: var(--fit-width, 100%);
      height: var(--fit-height, 720px);
      margin: 0 auto;
      overflow: visible;
    }

    .org-chart {
      position: relative;
      width: var(--chart-width, 1400px);
      height: var(--chart-height, 720px);
      transform: scale(var(--chart-scale, 1));
      transform-origin: top left;
    }

    .connector-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .connector-line {
      stroke: #8a949c;
      stroke-width: 1.35;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .person-card {
      position: absolute;
      display: grid;
      align-content: center;
      gap: 4px;
      width: var(--bubble-w);
      height: var(--bubble-h);
      padding: 8px 11px;
      border: 1px solid #aeb7bf;
      border-radius: 7px;
      background: #fff;
      box-shadow: 0 1px 2px rgba(21, 26, 31, .08);
      text-align: left;
      z-index: 2;
    }

    .person-card.leader {
      background: var(--dark);
      border-color: var(--dark);
      color: #fff;
    }

    .person-name {
      display: block;
      overflow: hidden;
      color: inherit;
      font-size: 12px;
      font-weight: 750;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .person-title {
      display: block;
      overflow: hidden;
      color: inherit;
      font-size: 10px;
      line-height: 1.2;
      opacity: .82;
      overflow-wrap: anywhere;
    }

    .site {
      display: inline-block;
      width: fit-content;
      margin-top: 1px;
      padding: 1px 5px;
      border-radius: 999px;
      background: #eef3f7;
      color: #53616d;
      font-size: 9px;
      font-weight: 700;
      line-height: 1.35;
    }

    .leader .site {
      background: rgba(255, 255, 255, .14);
      color: #fff;
    }

    @media (max-width: 900px) {
      .site-breakdown {
        grid-template-columns: 1fr;
      }

      .snapshot-controls {
        grid-template-columns: 1fr;
        margin-left: 0;
      }

      .chart-shell {
        padding: 16px;
      }
    }

    @media (max-width: 820px) {
      .snapshot-info-card {
        grid-template-columns: 1fr;
        height: auto;
      }

      .snapshot-info-card > div {
        padding: 7px 12px;
        border-right: 0;
        border-bottom: 1px solid #e1e6ea;
      }

      .snapshot-info-card > div:last-child {
        border-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="error-panel" id="errorPanel"></div>

    <section class="summary" aria-label="Snapshot summary">
      <div class="summary-card site-breakdown-card">
        <div class="site-card-header">
          <h1>Engineering Organization</h1>
        </div>
        <div class="site-breakdown" id="siteBreakdown"></div>
        <div class="snapshot-controls" aria-label="Snapshot controls">
          <div class="snapshot-info-card" aria-label="Current snapshot details">
            <div><span>Date</span><strong id="dateStat">-</strong></div>
            <div><span>Mark Direct Reports</span><strong id="directStat">-</strong></div>
            <div><span>Team Members</span><strong id="totalStat">-</strong></div>
          </div>
          <div class="snapshot-nav-card" aria-label="Navigate snapshots">
            <div class="summary-nav">
              <button class="arrow-button" id="previousButton" type="button" aria-label="Previous org chart">&larr;</button>
              <strong class="time-label">Time</strong>
              <button class="arrow-button" id="nextButton" type="button" aria-label="Next org chart">&rarr;</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="chart-shell" aria-label="Org chart viewport">
      <div class="chart-fit" id="chartFit">
        <div class="org-chart" id="chart"></div>
      </div>
    </section>
  </main>

  <script src="excel-org-data.js"></script>
  <script>
    const snapshots = (window.EXCEL_ORG_DATA && window.EXCEL_ORG_DATA.snapshots) || [];
    const chart = document.getElementById('chart');
    const chartFit = document.getElementById('chartFit');
    const previousButton = document.getElementById('previousButton');
    const nextButton = document.getElementById('nextButton');
    const errorPanel = document.getElementById('errorPanel');
    const siteBreakdown = document.getElementById('siteBreakdown');
    const dateStat = document.getElementById('dateStat');
    const directStat = document.getElementById('directStat');
    const totalStat = document.getElementById('totalStat');
    const bubble = { w: 190, h: 72, gapX: 48, rowGap: 18, topGap: 90, pad: 18, branchOffset: 56 };
    const siteNames = {
      SSF: 'South San Francisco',
      GIL: 'Guilford',
      CBD: 'Carlsbad',
      FRD: 'Frederick',
      AUS: 'Austin',
      WSAC: 'West Sacramento',
      REMOTE: 'Remote'
    };
    const siteColors = {
      SSF: '#2f6fdd',
      GIL: '#2f9d68',
      CBD: '#e6a23c',
      FRD: '#b75bd8',
      AUS: '#d95c59',
      WSAC: '#20a7b8',
      REMOTE: '#7b8794'
    };
    let currentIndex = Math.max(0, snapshots.length - 1);
    let lastRenderedIndex = currentIndex;

    function countEmployees(root) {
      let total = 0;
      const stack = [root];
      while (stack.length) {
        const node = stack.pop();
        total++;
        (node.children || []).forEach(child => stack.push(child));
      }
      return total;
    }

    function directReportCount(root) {
      return (root.children || []).length;
    }

    function siteCounts(root) {
      const counts = Object.fromEntries(Object.keys(siteNames).map(code => [code, 0]));
      const stack = [root];
      while (stack.length) {
        const node = stack.pop();
        const code = String(node.site || '').trim().toUpperCase();
        if (Object.prototype.hasOwnProperty.call(counts, code)) counts[code]++;
        (node.children || []).forEach(child => stack.push(child));
      }
      return counts;
    }

    function renderSiteBreakdown(root, total) {
      const counts = siteCounts(root);
      const sortedSites = Object.entries(siteNames).sort(([codeA], [codeB]) => {
        const countDiff = (counts[codeB] || 0) - (counts[codeA] || 0);
        return countDiff || codeA.localeCompare(codeB);
      });
      const visibleSites = sortedSites.filter(([code]) => (counts[code] || 0) > 0);
      const pieTotal = visibleSites.reduce((sum, [code]) => sum + (counts[code] || 0), 0);
      const cx = 64;
      const cy = 64;
      const radius = 54;
      let startAngle = -90;

      function pointOnCircle(angle) {
        const radians = angle * Math.PI / 180;
        return {
          x: cx + radius * Math.cos(radians),
          y: cy + radius * Math.sin(radians)
        };
      }

      function pieSlicePath(start, end) {
        const startPoint = pointOnCircle(start);
        const endPoint = pointOnCircle(end);
        const largeArc = end - start > 180 ? 1 : 0;
        return `M ${cx} ${cy} L ${startPoint.x.toFixed(3)} ${startPoint.y.toFixed(3)} A ${radius} ${radius} 0 ${largeArc} 1 ${endPoint.x.toFixed(3)} ${endPoint.y.toFixed(3)} Z`;
      }

      const slices = visibleSites.map(([code, name]) => {
        const count = counts[code] || 0;
        const endAngle = startAngle + (count / pieTotal) * 360;
        const path = pieSlicePath(startAngle, endAngle);
        startAngle = endAngle;
        return `<path d="${path}" fill="${siteColors[code]}" stroke="#fff" stroke-width="2"><title>${escapeHtml(name)}: ${count}</title></path>`;
      }).join('');

      const legend = sortedSites.map(([code, name]) => {
        const count = counts[code] || 0;
        const percent = total ? Math.round((count / total) * 100) : 0;
        return `
          <div class="site-legend-item" title="${escapeHtml(name)}">
            <span class="site-swatch" style="background:${siteColors[code]}"></span>
            <span class="site-code">${escapeHtml(code)}</span>
            <span class="site-detail">${count} / ${total} <span class="site-percent">(${percent}%)</span></span>
          </div>
        `;
      }).join('');

      siteBreakdown.innerHTML = `
        <div class="site-pie-wrap">
          <svg class="site-pie" viewBox="0 0 128 128" role="img" aria-label="Site distribution pie chart">
            ${pieTotal ? slices : `<circle class="site-pie-empty" cx="${cx}" cy="${cy}" r="${radius}"></circle>`}
            <circle cx="${cx}" cy="${cy}" r="28" fill="#fff"></circle>
            <text x="${cx}" y="${cy + 7}" text-anchor="middle" font-size="26" font-weight="850" fill="#151a1f">${pieTotal}</text>
          </svg>
          <span class="site-pie-label">Site Distribution</span>
        </div>
        <div class="site-legend">${legend}</div>
      `;
    }

    function maxDirectReports() {
      return Math.max(1, ...snapshots.map(snapshot => directReportCount(snapshot.tree)));
    }

    function layoutTree(root) {
      const columns = root.children && root.children.length ? root.children : [root];
      const stableColumnCount = maxDirectReports();
      const columnWidths = new Map();

      function maxDepth(node, depth = 0) {
        if (!node.children || !node.children.length) return depth;
        return Math.max(...node.children.map(child => maxDepth(child, depth + 1)));
      }

      function visibleRows(node) {
        let total = 1;
        (node.children || []).forEach(child => {
          total += visibleRows(child);
        });
        return total;
      }

      columns.forEach(columnRoot => {
        columnWidths.set(columnRoot, bubble.w + maxDepth(columnRoot) * bubble.branchOffset);
      });

      const totalColumnsWidth = columns.reduce((sum, column) => sum + columnWidths.get(column), 0) +
        Math.max(0, columns.length - 1) * bubble.gapX;
      const stableWidth = stableColumnCount * bubble.w + Math.max(0, stableColumnCount - 1) * bubble.gapX;
      const finalWidth = Math.max(960, totalColumnsWidth, stableWidth) + bubble.pad * 2;
      const rootY = bubble.pad;
      const columnTop = rootY + bubble.topGap;
      let xCursor = bubble.pad + Math.max(0, (finalWidth - bubble.pad * 2 - totalColumnsWidth) / 2);
      let maxBottom = rootY + bubble.h;

      root.x = finalWidth / 2 - bubble.w / 2;
      root.y = rootY;

      function placeVertical(node, left, top, depth) {
        node.x = left + depth * bubble.branchOffset;
        node.y = top;
        maxBottom = Math.max(maxBottom, node.y + bubble.h);

        let childTop = top + bubble.h + bubble.rowGap;
        node.children.forEach(child => {
          placeVertical(child, left, childTop, depth + 1);
          childTop += visibleRows(child) * (bubble.h + bubble.rowGap);
        });
      }

      columns.forEach(columnRoot => {
        placeVertical(columnRoot, xCursor, columnTop, 0);
        xCursor += columnWidths.get(columnRoot) + bubble.gapX;
      });

      return { width: finalWidth, height: maxBottom + bubble.pad };
    }

    function fitChart(size) {
      const shell = chartFit.parentElement;
      const available = Math.max(720, shell.clientWidth - 10);
      const scale = Math.min(1.15, available / size.width);
      chart.style.setProperty('--chart-scale', scale.toFixed(3));
      chartFit.style.setProperty('--fit-width', `${Math.ceil(size.width * scale)}px`);
      chartFit.style.setProperty('--fit-height', `${Math.ceil(size.height * scale)}px`);
    }

    function collectNodes(root) {
      const nodes = [];
      function visit(node) {
        nodes.push(node);
        (node.children || []).forEach(child => {
          child.parent = node;
          visit(child);
        });
      }
      visit(root);
      return nodes;
    }

    function renderConnectors(nodes, size) {
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.classList.add('connector-layer');
      svg.setAttribute('viewBox', `0 0 ${size.width} ${size.height}`);

      function drawPath(d) {
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.classList.add('connector-line');
        path.setAttribute('d', d);
        svg.appendChild(path);
      }

      function renderRootBus(root) {
        const children = root.children || [];
        if (!children.length) return;

        const rootX = root.x + bubble.w / 2;
        const rootBottom = root.y + bubble.h;
        const busY = rootBottom + Math.max(18, (children[0].y - rootBottom) * 0.45);
        const childCenters = children.map(child => child.x + bubble.w / 2);
        const minX = Math.min(...childCenters);
        const maxX = Math.max(...childCenters);

        drawPath(`M ${rootX} ${rootBottom} V ${busY} H ${minX}`);
        if (maxX > minX) drawPath(`M ${minX} ${busY} H ${maxX}`);
        children.forEach(child => {
          const childX = child.x + bubble.w / 2;
          drawPath(`M ${childX} ${busY} V ${child.y}`);
        });
      }

      function renderSideRail(parent) {
        const children = parent.children || [];
        if (!children.length || !parent.parent) return;

        const first = children[0];
        const last = children[children.length - 1];
        const parentCenter = parent.x + bubble.w / 2;
        const parentBottom = parent.y + bubble.h;
        const railX = Math.min(...children.map(child => child.x)) - 18;
        const entryY = Math.min(parentBottom + 12, first.y + bubble.h / 2);
        const firstTapY = first.y + bubble.h / 2;
        const lastTapY = last.y + bubble.h / 2;

        drawPath(`M ${parentCenter} ${parentBottom} V ${entryY} H ${railX} V ${lastTapY}`);
        children.forEach(child => {
          const tapY = child.y + bubble.h / 2;
          drawPath(`M ${railX} ${tapY} H ${child.x}`);
        });
      }

      const root = nodes.find(node => !node.parent);
      if (root) renderRootBus(root);
      nodes.forEach(renderSideRail);

      chart.appendChild(svg);
    }

    function renderCard(node) {
      const card = document.createElement('article');
      card.className = `person-card${node.parent ? '' : ' leader'}`;
      card.style.left = `${node.x}px`;
      card.style.top = `${node.y}px`;
      card.innerHTML = `
        <span class="person-name">${escapeHtml(node.name || '')}</span>
        <span class="person-title">${escapeHtml(node.title || 'Role not listed')}</span>
        <span class="site">${escapeHtml(node.site || 'Site not listed')}</span>
      `;
      chart.appendChild(card);
    }

    function renderSnapshot(index) {
      try {
        errorPanel.classList.remove('visible');
        errorPanel.textContent = '';
        const snapshot = snapshots[index];
        if (!snapshot || !snapshot.tree) {
          chart.textContent = 'No Excel org snapshots were found. Run Extract-ExcelOrgData.ps1.';
          siteBreakdown.innerHTML = '';
          dateStat.textContent = '-';
          directStat.textContent = '-';
          totalStat.textContent = '-';
          previousButton.disabled = true;
          nextButton.disabled = true;
          return;
        }

        const root = snapshot.tree;
        const size = layoutTree(root);
        const nodes = collectNodes(root);
        fitChart(size);
        chart.innerHTML = '';
        chart.style.setProperty('--chart-width', `${size.width}px`);
        chart.style.setProperty('--chart-height', `${size.height}px`);

        renderConnectors(nodes, size);
        nodes.forEach(renderCard);

        const totalEmployees = snapshot.totalEmployees || countEmployees(root);
        dateStat.textContent = snapshot.label;
        directStat.textContent = directReportCount(root);
        totalStat.textContent = totalEmployees;
        renderSiteBreakdown(root, totalEmployees);
        previousButton.disabled = index <= 0;
        nextButton.disabled = index >= snapshots.length - 1;
        lastRenderedIndex = index;
      } catch (error) {
        chart.innerHTML = '';
        errorPanel.textContent = `Could not render the org chart: ${error.message}`;
        errorPanel.classList.add('visible');
        console.error(error);
      }
    }

    function setSnapshot(index) {
      if (!snapshots.length) {
        currentIndex = 0;
        renderSnapshot(0);
        return;
      }
      currentIndex = Math.max(0, Math.min(index, snapshots.length - 1));
      renderSnapshot(currentIndex);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[char]));
    }

    nextButton.addEventListener('click', () => {
      setSnapshot(currentIndex + 1);
    });
    previousButton.addEventListener('click', () => {
      setSnapshot(currentIndex - 1);
    });
    document.addEventListener('keydown', event => {
      const activeTag = document.activeElement && document.activeElement.tagName;
      if (activeTag === 'INPUT' || activeTag === 'SELECT' || activeTag === 'TEXTAREA') return;
      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        setSnapshot(currentIndex - 1);
      }
      if (event.key === 'ArrowRight') {
        event.preventDefault();
        setSnapshot(currentIndex + 1);
      }
    });
    window.addEventListener('resize', () => renderSnapshot(lastRenderedIndex));

    setSnapshot(currentIndex);
  </script>
